<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LynkiD - Daily Check-in</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --gold:#F5A623;--gold-l:#FFD76E;--gold-d:#C47F17;
  --pur:#7B4FBF;--pur-l:#A87FE0;--pur-d:#5A3590;
  --grn:#58CC02;--grn-d:#46a302;
  --red:#FF4B4B;--blu:#1CB0F6;--org:#FF9600;
  --bg:#2D1B4E;--bg2:#3A2560;--bg3:#4A3370;
  --cbg:#F0E6FF;--cbg2:#E8D8F8;
  --td:#3A2560;--tl:#fff;--dim:#9B8BB5;
}
body{font-family:'Nunito',sans-serif;background:#1a0e30;color:var(--tl);overflow:auto;user-select:none;-webkit-user-select:none;}

/* Loading Screen */
.loading-screen{position:fixed;inset:0;z-index:9999;background:linear-gradient(170deg,#3b1f6e 0%,#1f0f3d 40%,#0d0620 100%);display:flex;align-items:center;justify-content:center;transition:opacity .5s,visibility .5s;}
.loading-screen.hide{opacity:0;visibility:hidden;pointer-events:none;}
.loading-inner{text-align:center;}
.loading-logo{font-size:80px;animation:mBob 2s ease-in-out infinite;filter:drop-shadow(0 12px 30px rgba(245,166,35,.3));}
.loading-title{font-size:28px;font-weight:900;color:var(--gold-l);margin-top:12px;text-shadow:0 2px 16px rgba(245,166,35,.35);}
.loading-sub{font-size:13px;font-weight:700;color:var(--dim);margin-top:4px;}
.loading-bar{width:180px;height:4px;background:var(--bg3);border-radius:4px;margin:20px auto 10px;overflow:hidden;}
.loading-fill{height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--gold-l));border-radius:4px;transition:width .3s;}
.loading-text{font-size:11px;font-weight:700;color:var(--dim);}
.layout{display:flex;gap:24px;padding:20px;justify-content:center;align-items:flex-start;min-height:100vh;}

/* ===== PHONE ===== */
.phone{width:393px;height:852px;flex-shrink:0;position:relative;overflow:hidden;display:flex;flex-direction:column;border-radius:24px;box-shadow:0 0 60px rgba(0,0,0,.6);}

/* Animated BG */
.phone-bg{position:absolute;inset:0;z-index:0;background:linear-gradient(170deg,#3b1f6e 0%,#1f0f3d 40%,#0d0620 100%);}
.phone-bg::before{content:'';position:absolute;top:-40%;right:-30%;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(245,166,35,.08) 0%,transparent 70%);animation:bgOrb 8s ease-in-out infinite;}
.phone-bg::after{content:'';position:absolute;bottom:-30%;left:-20%;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(123,79,191,.1) 0%,transparent 70%);animation:bgOrb 10s ease-in-out infinite reverse;}
@keyframes bgOrb{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(30px,-20px) scale(1.1);}}
.bg-stars{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.bg-star{position:absolute;width:3px;height:3px;border-radius:50%;background:#fff;opacity:0;animation:twinkle 3s ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(.5);}50%{opacity:.4;transform:scale(1);}}

/* Header */
.hdr{padding:52px 20px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;z-index:10;}
.hdr-streak{display:flex;align-items:center;gap:5px;padding:6px 14px;border-radius:20px;font-weight:800;font-size:14px;background:rgba(255,150,0,.15);color:var(--org);border:1.5px solid rgba(255,150,0,.25);cursor:pointer;transition:transform .15s;}
.hdr-streak:active{transform:scale(.9);}
.hdr-icons{display:flex;gap:8px;}
.hdr-ic{width:42px;height:42px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;position:relative;transition:transform .15s;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);backdrop-filter:blur(4px);}
.hdr-ic:active{transform:scale(.85);}
.hdr-ic .dot{position:absolute;top:-4px;right:-4px;min-width:18px;height:18px;border-radius:9px;background:var(--red);font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid var(--bg);}

/* Lobby */
.lobby{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;z-index:1;padding:0 0 4px;justify-content:center;}

/* Mascot */
.mascot-wrap{text-align:center;margin-bottom:8px;cursor:pointer;position:relative;}
.mascot-wrap:active .mascot-ch{transform:scale(.88);}
.mascot-ch{font-size:72px;transition:transform .2s;filter:drop-shadow(0 12px 30px rgba(245,166,35,.25));animation:mBob 3s ease-in-out infinite;}
@keyframes mBob{0%,100%{transform:translateY(0) rotate(-1deg);}50%{transform:translateY(-10px) rotate(1deg);}}
.mascot-ch.happy{animation:mHappy .6s ease-out!important;}
@keyframes mHappy{0%{transform:scale(1);}30%{transform:scale(1.3) rotate(8deg);}60%{transform:scale(1.1) rotate(-4deg);}100%{transform:scale(1);}}
.mascot-bub{position:absolute;top:-8px;right:-24px;background:#fff;color:var(--td);padding:6px 12px;border-radius:12px;font-size:11px;font-weight:700;box-shadow:0 4px 16px rgba(0,0,0,.2);opacity:0;transform:scale(.5) translateY(8px);transition:all .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap;}
.mascot-bub.show{opacity:1;transform:scale(1) translateY(0);}
.mascot-bub::after{content:'';position:absolute;bottom:-5px;left:18px;width:10px;height:10px;background:#fff;transform:rotate(45deg);border-radius:2px;}

/* Streak display */
.streak-display{text-align:center;margin-bottom:12px;}
.streak-big{font-size:28px;font-weight:900;color:var(--gold-l);text-shadow:0 2px 16px rgba(245,166,35,.35);}
.streak-sub{font-size:11px;color:var(--dim);font-weight:700;margin-top:2px;}

/* Next milestone bar */
.next-ms{margin:0 20px 12px;padding:10px 14px;border-radius:14px;display:flex;align-items:center;gap:10px;background:rgba(245,166,35,.06);border:1.5px solid rgba(245,166,35,.15);cursor:pointer;transition:all .2s;}
.next-ms:active{transform:scale(.97);}
.next-ms .nm-ic{font-size:28px;}
.next-ms .nm-info{flex:1;}
.next-ms .nm-t{font-size:11px;font-weight:800;color:var(--gold-l);}
.next-ms .nm-s{font-size:10px;color:var(--dim);font-weight:600;}
.next-ms .nm-bar{height:3px;background:var(--bg3);border-radius:3px;margin-top:4px;overflow:hidden;}
.next-ms .nm-fill{height:100%;background:var(--gold);border-radius:3px;transition:width .5s;}
.next-ms .nm-arr{font-size:16px;color:var(--gold);animation:arrP 1.5s ease-in-out infinite;}
@keyframes arrP{0%,100%{transform:translateX(0);opacity:.5;}50%{transform:translateX(4px);opacity:1;}}

/* ===== CALENDAR STRIP ===== */
.strip-area{width:100%;flex-shrink:0;position:relative;z-index:1;}
.strip-label{margin:0 20px 6px;font-size:12px;font-weight:800;color:var(--dim);display:flex;align-items:center;gap:6px;}
.strip{display:flex;gap:6px;overflow-x:scroll;scroll-snap-type:x proximity;padding:4px 20px 8px;scrollbar-width:none;cursor:grab;}
.strip:active{cursor:grabbing;}
.strip::-webkit-scrollbar{display:none;}
.strip-dots{display:flex;justify-content:center;gap:4px;margin:4px 0 0;}
.s-dot{width:6px;height:6px;border-radius:50%;background:var(--bg3);transition:all .3s;}
.s-dot.on{width:18px;border-radius:3px;background:var(--gold);}

/* Day card */
.dc{flex:0 0 72px;display:flex;flex-direction:column;align-items:center;position:relative;scroll-snap-align:center;transition:transform .15s;}
.dc:active{transform:scale(.9);}
.dc-lbl{font-size:9px;font-weight:700;color:var(--dim);margin-bottom:3px;}
.dc-lbl.today{color:var(--gold-l);font-weight:800;}
.dc-body{width:66px;height:84px;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;transition:all .3s;}
.dc-ico{font-size:22px;line-height:1;}
.dc-rw{font-size:7px;font-weight:700;margin-top:2px;max-width:58px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dc .ms-star{position:absolute;top:-5px;right:-2px;font-size:7px;background:var(--gold);color:var(--td);border-radius:4px;padding:1px 4px;font-weight:900;z-index:3;}

/* States */
.dc.checked .dc-body{background:linear-gradient(135deg,#6DD400,var(--grn));border:2.5px solid var(--grn-d);box-shadow:0 3px 0 var(--grn-d);}
.dc.checked .dc-body::after{content:'';position:absolute;inset:0;background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.12) 50%,transparent 60%);animation:shim 3s ease-in-out infinite;}
@keyframes shim{0%{transform:translateX(-100%);}100%{transform:translateX(100%);}}
.dc.checked .dc-rw{color:rgba(255,255,255,.8);}

.dc.today .dc-body{background:linear-gradient(135deg,#3d2415,#2c1810);border:2.5px solid var(--gold);box-shadow:0 3px 0 var(--gold-d),0 0 20px rgba(245,166,35,.2);animation:tPulse 2s ease-in-out infinite;}
@keyframes tPulse{0%,100%{box-shadow:0 3px 0 var(--gold-d),0 0 14px rgba(245,166,35,.15);}50%{box-shadow:0 3px 0 var(--gold-d),0 0 26px rgba(245,166,35,.35);}}

.dc.future .dc-body{background:var(--bg2);border:2.5px solid var(--bg3);opacity:.3;}
.dc.future .dc-rw{color:var(--dim);}

/* Missed day — red tint, tappable */
.dc.missed .dc-body{background:linear-gradient(135deg,#3d1520,#2c1018);border:2.5px solid var(--red);opacity:.7;box-shadow:0 3px 0 #8b1a1a;}
.dc.missed .dc-rw{color:rgba(255,255,255,.6);}
.dc.missed .dc-lbl{color:var(--red);}

/* Tear page */
.tear-page{position:absolute;inset:0;border-radius:14px;z-index:5;background:linear-gradient(160deg,#FFF8E7,#F5E6D0,#E8D5B8);display:flex;flex-direction:column;align-items:center;justify-content:center;transform-origin:top center;cursor:grab;box-shadow:0 4px 12px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.5);transition:transform .1s linear,opacity .1s linear;}
.tear-page:active{cursor:grabbing;}
.tear-page::before{content:'';position:absolute;top:0;left:8%;right:8%;height:2px;border-top:2px dashed rgba(90,62,40,.2);}
.tear-page::after{content:'';position:absolute;bottom:0;left:8%;right:8%;height:2px;border-bottom:2px dashed rgba(90,62,40,.15);}
.tear-day{font-size:26px;font-weight:900;color:#5a3e28;}
.tear-sub{font-size:9px;font-weight:700;color:#8a6d55;margin-top:1px;}
.tear-hint{position:absolute;bottom:5px;font-size:7px;color:#a08060;font-weight:700;animation:hp 1.5s ease-in-out infinite;}
@keyframes hp{0%,100%{opacity:.3;transform:translateY(0);}50%{opacity:1;transform:translateY(-2px);}}
.tear-page.tearing{transition:transform .5s cubic-bezier(.4,0,.2,1),opacity .4s ease-out;transform:perspective(400px) rotateX(-120deg) translateY(40px) scale(.6);opacity:0;pointer-events:none;}
.dc.today .reveal{display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;transition:opacity .4s .2s;}
.dc.today.torn .reveal{opacity:1;}
.dc.today.torn .dc-body{background:linear-gradient(135deg,#6DD400,var(--grn));border-color:var(--grn-d);box-shadow:0 3px 0 var(--grn-d);}

/* Bottom */
.bot{flex-shrink:0;padding:6px 20px 34px;position:relative;z-index:1;}
.ok-btn{width:100%;padding:16px;border:none;border-radius:50px;font-family:'Nunito',sans-serif;font-size:18px;font-weight:900;color:#fff;cursor:pointer;letter-spacing:1px;text-transform:uppercase;background:linear-gradient(180deg,#7ddf2e,var(--grn));box-shadow:0 6px 0 var(--grn-d),0 0 24px rgba(88,204,2,.15),inset 0 2px 0 rgba(255,255,255,.2);transition:all .15s;}
.ok-btn:active{transform:translateY(4px);box-shadow:0 2px 0 var(--grn-d);}
.ok-btn.done{background:linear-gradient(180deg,#4A3370,#2D1B4E);box-shadow:0 6px 0 #1a0e30;color:var(--dim);cursor:default;}
#banner.success{color:var(--grn);}

/* ===== FULLSCREEN CELEBRATION ===== */
.celeb{display:none;position:absolute;inset:0;z-index:250;flex-direction:column;align-items:center;justify-content:center;text-align:center;overflow:hidden;}
.celeb.show{display:flex;animation:celebIn .6s ease-out;}
@keyframes celebIn{0%{opacity:0;}100%{opacity:1;}}
.celeb-bg{position:absolute;inset:0;background:linear-gradient(170deg,rgba(59,31,110,.97),rgba(31,15,61,.98),rgba(13,6,32,.99));backdrop-filter:blur(20px);}
.celeb-particles{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.celeb-glow{position:absolute;top:20%;left:50%;transform:translateX(-50%);width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(245,166,35,.2) 0%,rgba(123,79,191,.1) 40%,transparent 70%);animation:celebGlow 3s ease-in-out infinite;}
@keyframes celebGlow{0%,100%{transform:translateX(-50%) scale(1);opacity:.6;}50%{transform:translateX(-50%) scale(1.2);opacity:1;}}
.celeb-content{position:relative;z-index:2;padding:20px;max-width:340px;}
.celeb-icon{font-size:80px;margin-bottom:8px;animation:celebBounce .8s cubic-bezier(.34,1.56,.64,1);filter:drop-shadow(0 8px 24px rgba(245,166,35,.4));}
@keyframes celebBounce{0%{transform:scale(0) rotate(-20deg);opacity:0;}60%{transform:scale(1.2) rotate(5deg);}100%{transform:scale(1) rotate(0);opacity:1;}}
.celeb-title{font-size:24px;font-weight:900;color:var(--gold-l);text-shadow:0 2px 20px rgba(245,166,35,.4);margin-bottom:4px;animation:celebSlide .5s .2s both;}
.celeb-sub{font-size:13px;font-weight:700;color:var(--dim);margin-bottom:20px;animation:celebSlide .5s .3s both;}
@keyframes celebSlide{0%{transform:translateY(20px);opacity:0;}100%{transform:translateY(0);opacity:1;}}
.celeb-reward{background:rgba(255,255,255,.06);border:2px solid rgba(245,166,35,.2);border-radius:16px;padding:16px;margin-bottom:20px;animation:celebSlide .5s .4s both;backdrop-filter:blur(4px);}
.celeb-rw-icon{font-size:44px;margin-bottom:6px;}
.celeb-rw-name{font-size:16px;font-weight:800;color:#fff;}
.celeb-rw-desc{font-size:11px;color:var(--dim);font-weight:600;margin-top:2px;}
.celeb-streak{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:20px;background:rgba(255,150,0,.12);border:1.5px solid rgba(255,150,0,.2);font-size:13px;font-weight:800;color:var(--org);margin-bottom:20px;animation:celebSlide .5s .5s both;}
.celeb-btn{width:100%;padding:16px;border:none;border-radius:50px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;color:#fff;cursor:pointer;text-transform:uppercase;letter-spacing:1px;background:linear-gradient(180deg,var(--gold-l),var(--gold));color:var(--td);box-shadow:0 6px 0 var(--gold-d),0 0 30px rgba(245,166,35,.2);transition:all .15s;animation:celebSlide .5s .6s both;}
.celeb-btn:active{transform:translateY(4px);box-shadow:0 2px 0 var(--gold-d);}
.celeb-share{width:100%;padding:12px;border:none;border-radius:50px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;color:var(--dim);cursor:pointer;background:rgba(255,255,255,.06);margin-top:8px;transition:all .15s;animation:celebSlide .5s .7s both;}
.celeb-share:active{transform:scale(.97);}
.celeb-confetti{position:absolute;width:8px;height:8px;border-radius:2px;animation:celebFall 2s ease-out forwards;pointer-events:none;z-index:1;}
@keyframes celebFall{0%{transform:translateY(0) rotate(0) scale(1);opacity:1;}100%{transform:translateY(400px) rotate(1080deg) scale(0);opacity:0;}}

/* ===== GAME POPUPS ===== */
.ov{display:none;position:absolute;inset:0;z-index:200;background:rgba(10,5,20,.82);align-items:center;justify-content:center;backdrop-filter:blur(6px);}
.ov.show{display:flex;}
.gf{width:330px;position:relative;animation:gfIn .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes gfIn{0%{transform:scale(.5) translateY(30px);opacity:0;}100%{transform:scale(1) translateY(0);opacity:1;}}
.gf-bdr{border:4px solid var(--gold);border-radius:22px;box-shadow:0 0 0 3px var(--gold-d),0 8px 32px rgba(0,0,0,.5),inset 0 0 0 2px var(--gold-l);overflow:hidden;}
.gf-inn{background:linear-gradient(180deg,var(--pur) 0%,var(--pur-d) 6%,var(--cbg) 6%,var(--cbg) 100%);}
.gf-ttl{text-align:center;padding:10px 16px 8px;font-size:15px;font-weight:900;color:var(--tl);text-shadow:0 2px 4px rgba(0,0,0,.3);}
.gf-body{background:var(--cbg);margin:0 8px 8px;border-radius:14px;padding:18px 14px;border:2px solid var(--cbg2);color:var(--td);text-align:center;position:relative;overflow:hidden;}
.gf-x{position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);width:36px;height:36px;border-radius:50%;background:var(--red);border:3px solid #cc3333;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#fff;cursor:pointer;box-shadow:0 3px 0 #aa2222;z-index:5;transition:transform .15s;}
.gf-x:active{transform:translateX(-50%) translateY(2px);}
.gf-top{position:absolute;top:-36px;left:50%;transform:translateX(-50%);font-size:52px;z-index:5;filter:drop-shadow(0 4px 12px rgba(245,166,35,.4));animation:topBob 2s ease-in-out infinite;}
@keyframes topBob{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(-4px);}}
.gb{width:100%;padding:11px;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;color:#fff;margin-top:7px;text-transform:uppercase;transition:all .15s;letter-spacing:.5px;}
.gb:active{transform:translateY(2px);box-shadow:none!important;}
.gb.gold{background:linear-gradient(180deg,var(--gold-l),var(--gold));color:var(--td);box-shadow:0 4px 0 var(--gold-d);}
.gb.pur{background:linear-gradient(180deg,var(--pur-l),var(--pur));box-shadow:0 4px 0 var(--pur-d);}
.gb.grn{background:linear-gradient(180deg,#7ddf2e,var(--grn));box-shadow:0 4px 0 var(--grn-d);}
.gb.ghost{background:transparent;box-shadow:none;color:var(--pur);font-size:11px;text-transform:none;margin-top:3px;}
.rr{display:flex;align-items:center;gap:10px;padding:9px;background:rgba(123,79,191,.06);border-radius:10px;margin-bottom:5px;text-align:left;}
.rr .ri{font-size:26px;flex-shrink:0;}
.rr .rt{flex:1;}
.rr .ra{font-size:13px;font-weight:800;color:var(--td);}
.rr .ry{font-size:9px;color:var(--pur);font-weight:600;}
.rr .rx{font-size:8px;color:#999;font-weight:600;}
/* Vault */
.vs{display:flex;gap:5px;margin-bottom:10px;padding:10px;background:rgba(123,79,191,.05);border-radius:12px;border:1.5px solid var(--cbg2);}
.vs-i{flex:1;text-align:center;padding:6px 3px;}
.vs-i+.vs-i{border-left:1.5px solid var(--cbg2);}
.vs-i .vn{font-size:16px;font-weight:900;}
.vs-i .vl{font-size:7px;font-weight:700;color:var(--pur);text-transform:uppercase;margin-top:1px;display:flex;align-items:center;justify-content:center;gap:2px;}
.vs-i:nth-child(1) .vn{color:var(--gold-d);}
.vs-i:nth-child(2) .vn{color:var(--pur);}
.vs-i:nth-child(3) .vn{color:var(--blu);}
.vsc{max-height:280px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--cbg2) transparent;}
.vsc::-webkit-scrollbar{width:3px;}
.vsc::-webkit-scrollbar-thumb{background:var(--cbg2);border-radius:3px;}
/* Vault item card */
.vi{display:flex;align-items:center;gap:10px;padding:10px 12px;margin-bottom:6px;background:#fff;border-radius:12px;border:1.5px solid #eee;box-shadow:0 1px 4px rgba(0,0,0,.04);position:relative;}
.vi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:12px 0 0 12px;}
.vi.coin::before{background:var(--gold);}
.vi.voucher::before{background:var(--grn);}
.vi.game::before{background:var(--red);}
.vi-ic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;background:#f5f5f5;flex-shrink:0;}
.vi-info{flex:1;min-width:0;}
.vi-name{font-size:13px;font-weight:800;color:var(--td);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.vi-desc{font-size:9px;color:#888;font-weight:600;}
.vi-tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:8px;font-weight:800;margin-top:2px;text-transform:uppercase;}
.vi-tag.coin{background:rgba(245,166,35,.12);color:var(--gold-d);}
.vi-tag.voucher{background:rgba(123,79,191,.1);color:var(--pur);}
.vi-tag.game{background:rgba(255,75,75,.1);color:var(--red);}

// ===== NEXT MILESTONE =====
function updateNM(){
  var n=MS.find(function(m){return m.st==='unlocked';})||MS.find(function(m){return m.st==='locked';});
  if(!n)return;
  $('nmIc').textContent=n.icon;
  $('nmT').textContent='Cột mốc: Ngày '+n.day+' — '+(n.unk?'???':n.name);
  var r=Math.max(0,n.day-CUR);
  $('nmS').textContent=r===0?'Đã đạt! Nhận ngay →':'Còn '+r+' ngày nữa';
  $('nmF').style.width=Math.min(100,(CUR/n.day)*100)+'%';
}

// ===== STRIP =====
var _tearClean=null;
function renderStrip(){
  var s=$('strip');s.innerHTML='';
  DAYS.forEach(function(d){
    var c=document.createElement('div');
    var st=(d.st==='today'&&done)?'checked':d.st;
    c.className='dc '+st+(d.isMs?' ms':'');
    var lc=d.st==='today'?'dc-lbl today':'dc-lbl';
    var lt=d.st==='today'?'Hôm nay':d.day===CUR+1?'Ngày mai':'Ngày '+d.day;
    var body='';
    if(st==='checked'){
      body='<span class="dc-ico">✅</span><span class="dc-rw">'+d.label+'</span>';
    }else if(st==='today'){
      body='<div class="reveal"><span class="dc-ico">'+d.icon+'</span><span class="dc-rw">'+d.label+'</span></div><div class="tear-page" id="tearPage"><div class="tear-day">'+d.day+'</div><div class="tear-sub">Hôm nay</div><div class="tear-hint">↕ Kéo để xé</div></div>';
    }else if(st==='missed'){
      body='<span class="dc-ico">❌</span><span class="dc-rw">Bỏ lỡ</span>';
    }else{
      body='<span class="dc-ico">❓</span><span class="dc-rw">'+d.label+'</span>';
    }
    c.innerHTML='<div class="'+lc+'">'+lt+'</div><div class="dc-body">'+body+'</div>'+(d.isMs?'<span class="ms-star">★</span>':'');
    // Click handlers
    if(st==='missed'){c.onclick=function(){showMakeup(d);};}
    else if(st==='checked'||st==='future'){c.onclick=function(){showDayDetail(d);};}
    s.appendChild(c);
  });
  requestAnimationFrame(function(){var idx=DAYS.findIndex(function(d){return d.day===CUR;});s.scrollLeft=Math.max(0,(idx-1)*80);});
  if(!done)setupTear();
  setupDrag(s);
  updateDots();
}

function updateDots(){
  var s=$('strip'),dots=$('sDots');
  var pages=Math.ceil(30/4);dots.innerHTML='';
  for(var i=0;i<pages;i++){var d=document.createElement('div');d.className='s-dot'+(i===Math.floor((CUR-1)/4)?' on':'');dots.appendChild(d);}
  s.onscroll=function(){var pg=Math.floor(s.scrollLeft/320);dots.querySelectorAll('.s-dot').forEach(function(d,i){d.classList.toggle('on',i===pg);});};
}

// Mouse drag for desktop
function setupDrag(el){
  var isD=false,sx,sl,moved;
  el.onmousedown=function(e){if(e.target.closest('.tear-page'))return;isD=true;moved=false;sx=e.pageX-el.offsetLeft;sl=el.scrollLeft;el.style.scrollSnapType='none';el.style.cursor='grabbing';e.preventDefault();};
  el.onmouseleave=function(){if(!isD)return;isD=false;el.style.scrollSnapType='';el.style.cursor='grab';};
  el.onmouseup=function(e){if(!isD)return;isD=false;el.style.scrollSnapType='';el.style.cursor='grab';if(!moved){var card=e.target.closest('.dc');if(card)card.click();}};
  el.onmousemove=function(e){if(!isD)return;e.preventDefault();var x=e.pageX-el.offsetLeft;var w=(x-sx)*1.5;if(Math.abs(w)>5)moved=true;el.scrollLeft=sl-w;};
  el.onwheel=function(e){if(Math.abs(e.deltaX)>Math.abs(e.deltaY))return;e.preventDefault();el.scrollLeft+=e.deltaY;};
}

// ===== DAY DETAIL =====
function showDayDetail(d){
  $('ddTt').textContent='NGÀY '+d.day;
  $('ddIc').textContent=d.st==='checked'||done?'✅':'🔮';
  $('ddNm').textContent=d.label;
  $('ddSb').textContent=d.st==='checked'?'Đã điểm danh ✓':d.st==='future'?'Chưa đến ngày này':'Đã điểm danh ✓';
  $('ddRw').innerHTML=rwHtml(d.rw);
  showOv('ovDd');
}

// ===== MAKEUP (điểm danh bù) =====
var _muDay=null;
function showMakeup(d){
  _muDay=d;
  $('muTt').textContent='Bù ngày '+d.day;
  $('muSb').textContent=makeupCredits>0?'Bạn có '+makeupCredits+' lượt bù. Sử dụng để điểm danh ngày này?':'Bạn hết lượt bù! Hoàn thành nhiệm vụ để nhận thêm.';
  $('muRw').innerHTML=rwHtml(d.rw);
  $('muBtn').style.display=makeupCredits>0?'':'none';
  $('muLeft').textContent='Lượt bù còn lại: '+makeupCredits;
  showOv('ovMu');
}
function doMakeup(){
  if(!_muDay||makeupCredits<=0)return;
  makeupCredits--;
  _muDay.st='checked';
  closeOv('ovMu');
  renderStrip();
  // Show reward
  $('rwIc').textContent='🔄';
  $('rwTt').textContent='Điểm danh bù thành công!';
  $('rwSb').textContent='Ngày '+_muDay.day+' đã được bù';
  $('rwLs').innerHTML=rwHtml(_muDay.rw);
  showOv('ovRw');confetti($('#ovRw .gf-body')||document.querySelector('#ovRw .gf-body'));
  _muDay=null;
}

// ===== TEAR =====
function setupTear(){
  var pg=$('tearPage');if(!pg)return;
  if(_tearClean)_tearClean();
  var sy=0,cy=0,dr=false;
  function start(e){dr=true;sy=e.touches?e.touches[0].clientY:e.clientY;pg.style.transition='none';}
  function move(e){if(!dr)return;e.preventDefault();cy=(e.touches?e.touches[0].clientY:e.clientY)-sy;var p=Math.min(1,Math.abs(cy)/100);pg.style.transform='perspective(400px) rotateX('+(cy<0?-1:1)*p*60+'deg) scale('+(1-p*.2)+')';pg.style.opacity=1-p*.6;}
  function end(){if(!dr)return;dr=false;if(Math.abs(cy)>70){pg.style.transition='transform .4s cubic-bezier(.4,0,.2,1),opacity .3s';var dir=cy<0?-1:1;pg.style.transform='perspective(400px) rotateX('+dir*-120+'deg) translateY('+dir*50+'px) scale(.5)';pg.style.opacity='0';setTimeout(doCheckin,400);}else{pg.style.transition='transform .3s,opacity .3s';pg.style.transform='';pg.style.opacity='1';}cy=0;}
  pg.addEventListener('touchstart',start,{passive:true});pg.addEventListener('touchmove',move,{passive:false});pg.addEventListener('touchend',end);
  pg.addEventListener('mousedown',start);window.addEventListener('mousemove',move);window.addEventListener('mouseup',end);
  _tearClean=function(){window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',end);};
}

function onOk(){if(done){showOv('ovAl');return;}var pg=$('tearPage');if(pg){pg.classList.add('tearing');setTimeout(doCheckin,500);}}

function doCheckin(){
  if(done)return;done=true;
  $('banner').textContent='Nhận thưởng ngày mai nhé! 🎉';$('banner').classList.add('success');
  $('okBtn').classList.add('done');$('okBtn').textContent='✅ Đã điểm danh';
  var mc=$('mascot');mc.classList.add('happy');setTimeout(function(){mc.classList.remove('happy');},700);
  var today=DAYS.find(function(d){return d.day===CUR;});
  var rw=today.rw;
  var now=new Date().toTimeString().slice(0,5);
  VAULT.push({i:rw.i,n:rw.a,desc:rw.t,t:'07/04 '+now,c:rw.i==='🪙'?'coin':rw.i==='🎟️'?'voucher':'game',act:rw.i==='🪙'?'Đã cộng':rw.i==='🎟️'?'Dùng ngay':'Chơi ngay'});
  VT.coins+=20;
  for(var i=0;i<5;i++)setTimeout(spawnCoin,i*100);
  $('vBadge').textContent=VAULT.length;
  renderStrip();updateNM();

  // Check milestone
  var hitMs=MS.find(function(m){return m.day===CUR&&m.st==='unlocked';});
  if(hitMs){
    _pendingMs=MS.indexOf(hitMs);
    $('msRTop').textContent=hitMs.icon;$('msRIc').textContent=hitMs.icon;
    $('msRTt').textContent='Cột mốc ngày '+hitMs.day+'!';
    $('msRSb').textContent='Chúc mừng! Bạn đã đạt cột mốc '+hitMs.name;
    $('msRRw').innerHTML=rwHtml(hitMs.rw);
    showOv('ovMsR');celebConfetti();
    for(var j=0;j<8;j++)setTimeout(spawnCoin,j*80);
  }else{
    showCeleb(rw.i,rw.a,rw.t);
  }
}

// ===== FULLSCREEN CELEBRATION =====
function showCeleb(icon,name,desc){
  $('celebIc').textContent='🎉';
  $('celebTt').textContent='CHÚC MỪNG!';
  $('celebSb').textContent='Điểm danh ngày '+CUR+' thành công';
  $('celebRwIc').textContent=icon;
  $('celebRwNm').textContent=name;
  $('celebRwDs').textContent=desc;
  $('celebStreak').textContent='🔥 '+STREAK+' ngày liên tiếp';
  $('celebScr').classList.add('show');
  celebConfetti();
}
function celebConfetti(){
  var el=$('celebParts');el.innerHTML='';
  var cols=['#58CC02','#FFC800','#CE82FF','#1CB0F6','#FF4B4B','#FF9600','#FFD76E'];
  for(var i=0;i<40;i++){
    var c=document.createElement('div');c.className='celeb-confetti';
    c.style.left=Math.random()*100+'%';c.style.top=-10+Math.random()*20+'%';
    c.style.background=cols[~~(Math.random()*cols.length)];
    c.style.animationDelay=Math.random()*1.5+'s';
    c.style.animationDuration=(1.5+Math.random()*1)+'s';
    c.style.width=(4+Math.random()*6)+'px';
    c.style.height=(4+Math.random()*6)+'px';
    el.appendChild(c);
  }
}
function closeCeleb(){
  $('celebScr').classList.remove('show');
  $('celebParts').innerHTML='';
}

function claimMsPopup(){
  closeOv('ovMsR');
  if(_pendingMs!==null)claimMs(_pendingMs);_pendingMs=null;
}

// ===== MASCOT =====
function tapMascot(){var mc=$('mascot');mc.classList.add('happy');setTimeout(function(){mc.classList.remove('happy');},700);var b=$('mascotBub');b.textContent=mascotPh[~~(Math.random()*mascotPh.length)];b.classList.add('show');setTimeout(function(){b.classList.remove('show');},2500);}

// ===== VAULT =====
function openVault(){if(VAULT.length===0){showOv('ovVE');return;}vaultFilter='all';renderVault();showOv('ovV');}
function renderVault(){
  $('vSum').innerHTML='<div class="vs-i"><div class="vn">'+VT.coins.toLocaleString()+'đ</div><div class="vl">🪙 Coin LynkiD</div></div><div class="vs-i"><div class="vn">'+VT.vouchers+'</div><div class="vl">🛒 Voucher</div></div><div class="vs-i"><div class="vn">'+VT.plays+'</div><div class="vl">🎮 Lượt chơi</div></div>';
  $('vTb').innerHTML=['all','coin','voucher','game'].map(function(t){return '<button class="vtab'+(vaultFilter===t?' on':'')+'" onclick="vaultFilter=\''+t+'\';renderVault()">'+(t==='all'?'Tất cả':t==='coin'?'🪙 Coin':t==='voucher'?'🛒 Voucher':'🎮 Game')+'</button>';}).join('');
  var f=vaultFilter==='all'?VAULT:VAULT.filter(function(v){return v.c===vaultFilter;});
  $('vLs').innerHTML=f.length?f.slice().reverse().map(function(v){
    var actCls=v.c==='coin'?'used':v.c==='voucher'?'use':'play';
    var actTxt=v.act||( v.c==='coin'?'Đã cộng':v.c==='voucher'?'Dùng ngay':'Chơi ngay');
    var tagCls=v.c;
    var tagTxt=v.c==='coin'?'COIN':v.c==='voucher'?'VOUCHER':'LƯỢT CHƠI';
    return '<div class="vi '+v.c+'"><div class="vi-ic">'+v.i+'</div><div class="vi-info"><div class="vi-name">'+v.n+'</div><div class="vi-desc">'+(v.desc||v.t)+'</div><div class="vi-tag '+tagCls+'">'+tagTxt+'</div></div><button class="vi-act '+actCls+'">'+actTxt+'</button></div>';
  }).join(''):'<div style="padding:16px;color:var(--dim);font-size:11px">Chưa có phần thưởng loại này</div>';
}
function openSettings(){showOv('ovSet');}
function openMissions(){
  $('miLs').innerHTML=MISSIONS.map(function(m,i){return '<div class="mi"><span class="mii">'+m.ic+'</span><div class="mif"><div class="mit">'+m.tt+'</div><div class="mid">'+m.ds+' · '+m.p+'/'+m.t+'</div><div class="mib"><div class="mibf" style="width:'+(m.p/m.t*100)+'%"></div></div></div><button class="mia '+(m.dn===1?'ok':m.dn===2?'ok':'no')+'" '+(m.dn===1?'onclick="claimMi('+i+')"':'')+'>'+(m.dn===2?'✅':m.dn===1?'Nhận':m.rw)+'</button></div>';}).join('');
  $('miLeft').textContent=makeupCredits;
  showOv('ovMi');
}
function claimMi(i){MISSIONS[i].dn=2;makeupCredits++;openMissions();}

// ===== MILESTONES =====
function openMilestones(){
  var cl=MS.filter(function(m){return m.st==='claimed';}).length;
  var fp=Math.min(100,(cl/MS.length)*100+5);
  $('msBody').innerHTML='<div class="msp"><div class="msl"></div><div class="mslf" style="height:'+fp+'%"></div>'+MS.map(function(m,i){
    var dc=m.st==='claimed'?'cl':m.st==='unlocked'?'ul':'lk';
    var det='';
    if(m.st==='claimed')det='<span style="color:var(--grn);font-weight:700">✓ Đã nhận</span>';
    else if(m.st==='unlocked')det='<span style="color:var(--gold);font-weight:700">Nhận ngay →</span>';
    else if(m.unk)det='<span style="color:var(--org)">❓ Bí ẩn</span>';
    else det=m.tags.map(function(t){return '<span class="mstag '+t+'">'+(t==='c'?'🪙 Coin':t==='v'?'🎟️ Voucher':'🎮 Game')+'</span>';}).join('')+'<span>Còn '+(m.day-CUR)+' ngày</span>';
    return '<div class="msn'+(m.big?' big':'')+'" onclick="onMsN('+i+')"><div class="msd '+dc+'"><span>'+m.icon+'</span>'+(m.st==='locked'?'<span class="lki">🔒</span>':'')+'</div><div class="msi"><div class="msi-d">Ngày '+m.day+'</div><div class="msi-n">'+(m.unk&&m.st==='locked'?'???':m.name)+'</div><div class="msi-dt">'+det+'</div></div></div>';
  }).join('')+'</div>';
  $('msScr').classList.add('show');
}
function closeMs(){$('msScr').classList.remove('show');}
function onMsN(i){
  var m=MS[i];
  if(m.st==='unlocked'){claimMs(i);return;}
  $('msDTt').textContent='CỘT MỐC NGÀY '+m.day;
  $('msDIc').textContent=m.st==='claimed'?'✅':m.unk?'❓':'🔒';
  $('msDNm').textContent=m.unk&&m.st==='locked'?'Phần thưởng bí ẩn':m.name;
  $('msDSb').textContent=m.st==='claimed'?'Đã nhận thưởng ✓':m.unk?'Sẽ tiết lộ khi đạt cột mốc!':'Còn '+(m.day-CUR)+' ngày nữa';
  $('msDRw').innerHTML=m.unk&&m.st!=='claimed'?'<div class="rr"><span class="ri">❓</span><div class="rt"><div class="ra">???</div><div class="ry">Phần thưởng bí ẩn</div></div></div>':rwHtml(m.rw);
  showOv('ovMsD');
}
function claimMs(i){
  var m=MS[i];if(m.st!=='unlocked')return;m.st='claimed';
  $('rwIc').textContent=m.icon;$('rwTt').textContent='Cột mốc ngày '+m.day+'!';$('rwSb').textContent=m.name;$('rwLs').innerHTML=rwHtml(m.rw);
  closeMs();showOv('ovRw');confetti(document.querySelector('#ovRw .gf-body'));
  for(var j=0;j<8;j++)setTimeout(spawnCoin,j*80);
  var nb=MS.filter(function(m){return m.st==='unlocked';}).length;
  $('mBadge').textContent=nb||'';if(!nb)$('mBadge').style.display='none';
  updateNM();
  // If reward is a box type (Hộp quà), show Blinbox redirect after closing reward popup
  if(m.name.indexOf('Hộp quà')>=0){
    var _oldClose=closeOv;
    var _hooked=false;
    closeOv=function(id){
      _oldClose(id);
      if(id==='ovRw'&&!_hooked){_hooked=true;closeOv=_oldClose;setTimeout(function(){showBlinboxPopup('Hộp quà '+m.name+'!','Mở hộp quà trong game Blinbox để nhận phần thưởng bí ẩn!');},400);}
    };
  }
}

// ===== BLINBOX =====
function showBlinboxPopup(title,sub){
  $('bbTitle').textContent=title||'Bạn nhận được Hộp quà!';
  $('bbSub').textContent=sub||'Mở hộp quà trong game Blinbox để nhận phần thưởng bí ẩn!';
  showOv('ovBlinbox');confetti(document.querySelector('#ovBlinbox .gf-body'));
}
function gotoBlinbox(){
  closeOv('ovBlinbox');
  // Simulate redirect to Blinbox game
  tLog('🎰 Điều hướng → Blinbox game','ok');
  alert('Điều hướng sang game Blinbox...\n(Trong app thật sẽ mở game Blinbox)');
}

// ===== TESTER =====
function tLog(msg,ty){var l=$('tLog');var t=new Date().toTimeString().slice(0,8);l.innerHTML+='<div class="li"><span class="lt">['+t+']</span> <span class="'+(ty==='ok'?'lok':ty==='err'?'ler':ty==='warn'?'lw':'')+'">'+msg+'</span></div>';l.scrollTop=l.scrollHeight;}
function tToast(msg,ty){var t=document.createElement('div');t.className='tt'+(ty?' '+ty:'');t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove();},3000);}

var _origCheckin=doCheckin;
function retryCheckin(){onOk();}
doCheckin=function(){
  if(done)return;
  if(netMode!=='ok'&&netMode!=='slow'){
    // Error states: show popup, DON'T set done=true, DON'T destroy tear page
    // Re-render strip to restore tear page
    done=false;renderStrip();
    if(netMode==='error')showOv('ovErrNet');
    else if(netMode==='server')showOv('ovErrSrv');
    else if(netMode==='timeout')showOv('ovErrTime');
    else if(netMode==='ended')showOv('ovErrEnd');
    tLog('❌ '+netMode,'err');
    return;
  }
  if(netMode==='slow'){
    tLog('🐌 Chậm 3s...','warn');showOv('ovLoading');
    setTimeout(function(){closeOv('ovLoading');_origCheckin();tLog('✅ OK (delay)','ok');},3000);
    return;
  }
  _origCheckin();tLog('✅ Check-in OK','ok');
};

var T={
  reset:function(){done=false;DAYS.forEach(function(d){if(d.day===CUR)d.st='today';});$('banner').textContent='↕ Kéo xé lịch để điểm danh!';$('banner').classList.remove('success');$('okBtn').classList.remove('done');$('okBtn').textContent='Điểm danh';renderStrip();tLog('🔄 Reset','ok');tToast('Reset','ok');},
  setDay:function(day){DAYS.forEach(function(d){d.st=d.day<day?'checked':d.day===day?'today':'future';});done=false;$('hStreak').textContent=day;$('sBig').textContent='🔥 '+day+' ngày liên tiếp';$('banner').textContent='↕ Kéo xé lịch để điểm danh!';$('banner').classList.remove('success');$('okBtn').classList.remove('done');$('okBtn').textContent='Điểm danh';CUR=day;renderStrip();updateNM();tLog('📅 Ngày='+day,'ok');},
  setStreak:function(s){STREAK=s;$('hStreak').textContent=s;$('sBig').textContent='🔥 '+s+' ngày liên tiếp';tLog('🔥 Streak='+s,'ok');if(s===0)showOv('ovSW');},
  miss:function(day){var d=DAYS.find(function(x){return x.day===day;});if(d){d.st='missed';renderStrip();tLog('❌ Bỏ lỡ ngày '+day,'warn');tToast('Bỏ lỡ ngày '+day,'w');}},
  missMulti:function(days){days.forEach(function(day){var d=DAYS.find(function(x){return x.day===day;});if(d)d.st='missed';});renderStrip();tLog('❌ Bỏ lỡ '+days.join(','),'warn');},
  missStreak:function(){T.setStreak(0);var y=DAYS.find(function(d){return d.day===CUR-1;});if(y)y.st='missed';renderStrip();tLog('💔 Mất streak','err');},
  addMakeup:function(n){makeupCredits=n;tLog('🔄 Lượt bù='+n,'ok');tToast('Lượt bù: '+n,'ok');},
  net:function(m){netMode=m;tLog('🌐 Net='+m,m==='ok'?'ok':'err');
    // Immediately show the error popup for testing
    if(m==='error')showOv('ovErrNet');
    else if(m==='server')showOv('ovErrSrv');
    else if(m==='timeout')showOv('ovErrTime');
    else if(m==='ended')showOv('ovErrEnd');
    else if(m==='slow')showOv('ovLoading');
  },
  setRw:function(type){var d=DAYS.find(function(x){return x.day===CUR;});if(!d)return;if(type==='none'){d.rw=[];d.label='Không quà';d.icon='📅';}else if(type==='coin'){d.rw=[{i:'🪙',a:'+100 Coin',t:'Điểm LynkiD'}];d.label='+100 Coin';d.icon='🪙';}else if(type==='voucher'){d.rw=[{i:'🎟️',a:'1 Voucher',t:'E-Voucher 50K'}];d.label='Voucher 50K';d.icon='🎟️';}else{d.rw=[{i:'🪙',a:'+500 Coin',t:'Điểm LynkiD'},{i:'🎟️',a:'1 Voucher',t:'E-Voucher 100K'},{i:'🎮',a:'+5 Lượt',t:'Lượt chơi game'}];d.label='Nhiều quà';d.icon='🎁';}renderStrip();tLog('🎁 Quà='+type,'ok');},
  emptyVault:function(){VAULT.length=0;VT.coins=0;VT.vouchers=0;VT.plays=0;$('vBadge').textContent='0';tLog('📦 Kho trống','warn');},
  fullVault:function(){VAULT.length=0;
    var items=[
      {i:'🪙',n:'+150đ',desc:'Coin LynkiD',c:'coin',act:'Đã cộng'},
      {i:'🪙',n:'+100đ',desc:'Coin LynkiD',c:'coin',act:'Đã cộng'},
      {i:'☕',n:'Highlands x2',desc:'Mua 2 tặng 1 đồ uống',c:'voucher',act:'Dùng ngay'},
      {i:'🛒',n:'Shopee 15k',desc:'Voucher giảm 15k đơn 99k+',c:'voucher',act:'Dùng ngay'},
      {i:'🛒',n:'Shopee 15k',desc:'Voucher giảm 15k đơn 99k+',c:'voucher',act:'Dùng ngay'},
      {i:'🎮',n:'x1 Lượt chơi',desc:'Game X trong LynkiD',c:'game',act:'Chơi ngay'},
      {i:'🪙',n:'+100đ',desc:'Coin LynkiD',c:'coin',act:'Đã cộng'},
      {i:'🪙',n:'+100đ',desc:'Coin LynkiD',c:'coin',act:'Đã cộng'},
      {i:'🛒',n:'Voucher 200k',desc:'E-Voucher giảm 200,000 VNĐ',c:'voucher',act:'Dùng ngay'},
      {i:'🎮',n:'x2 Lượt chơi',desc:'Game Y trong LynkiD',c:'game',act:'Chơi ngay'}
    ];
    for(var j=0;j<20;j++){var it=items[j%items.length];VAULT.push({i:it.i,n:it.n,desc:it.desc,t:'0'+((j%28)+1)+'/04 08:00',c:it.c,act:it.act});}
    VT.coins=5000;VT.vouchers=14;VT.plays=6;$('vBadge').textContent='20';tLog('📦 Kho đầy','ok');},
  msAll:function(){MS.forEach(function(m){m.st='claimed';});$('mBadge').textContent='0';$('mBadge').style.display='none';updateNM();tLog('🏆 All claimed','ok');},
  msNone:function(){MS.forEach(function(m){m.st='locked';});MS[0].st='unlocked';$('mBadge').textContent=MS.length;$('mBadge').style.display='';updateNM();tLog('🏆 All locked','warn');},
  msNext:function(){var n=MS.find(function(m){return m.st==='locked';});if(n){n.st='unlocked';updateNM();tLog('🏆 Mở ngày '+n.day,'ok');}},
  dblCheckin:function(){tLog('⚡ Double check-in','warn');onOk();setTimeout(onOk,100);setTimeout(onOk,200);},
  longName:function(){var d=DAYS.find(function(x){return x.day===CUR;});if(d){d.rw=[{i:'🎟️',a:'1 Super Mega Ultra Voucher',t:'E-Voucher Giảm Giá Đặc Biệt Siêu Khuyến Mãi 500K VNĐ'}];d.label='Super Mega Voucher';renderStrip();tLog('📝 Tên dài','warn');}},
  showBlinbox:function(){showBlinboxPopup();tLog('🎰 Blinbox popup','ok');},
  showRules:function(){showOv('ovRules');tLog('📜 Thể lệ','ok');},
  showLoading:function(){var scr=$('loadingScreen');scr.classList.remove('hide');var fill=$('loadingFill');var txt=$('loadingText');fill.style.width='0';txt.textContent='Đang tải...';var steps=[{p:30,t:'Đang kết nối...',d:400},{p:60,t:'Tải dữ liệu...',d:500},{p:85,t:'Chuẩn bị giao diện...',d:400},{p:100,t:'Sẵn sàng!',d:300}];var i=0;function next(){if(i>=steps.length){setTimeout(function(){scr.classList.add('hide');},200);return;}fill.style.width=steps[i].p+'%';txt.textContent=steps[i].t;var d=steps[i].d;i++;setTimeout(next,d);}next();tLog('⏳ Loading screen','ok');}
};

// ===== LOADING SCREEN =====
(function(){
  var fill=$('loadingFill'),txt=$('loadingText'),scr=$('loadingScreen');
  var steps=[
    {p:30,t:'Đang kết nối...',d:400},
    {p:60,t:'Tải dữ liệu...',d:500},
    {p:85,t:'Chuẩn bị giao diện...',d:400},
    {p:100,t:'Sẵn sàng!',d:300}
  ];
  var i=0;
  function next(){
    if(i>=steps.length){setTimeout(function(){scr.classList.add('hide');},200);return;}
    fill.style.width=steps[i].p+'%';txt.textContent=steps[i].t;
    var d=steps[i].d;i++;setTimeout(next,d);
  }
  next();
})();

// ===== INIT =====
renderStrip();updateNM();
</script>
